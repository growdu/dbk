# DBK PostgreSQL Integration Test Matrix
# Usage:
#   docker-compose up -d        # start all 4 versions
#   docker-compose down         # stop all
#   DBK_RUN_DOCKER_TESTS=1 python -m pytest tests/test_pg_integration_matrix.py
#
# To run specific versions:
#   DBK_PG_DOCKER_VERSIONS=16 docker-compose up -d

services:
  pg-14:
    image: postgres:14
    container_name: dbk-pg-14
    environment:
      POSTGRES_PASSWORD: dbk_secret
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 30

  pg-15:
    image: postgres:15
    container_name: dbk-pg-15
    environment:
      POSTGRES_PASSWORD: dbk_secret
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 30

  pg-16:
    image: postgres:16
    container_name: dbk-pg-16
    environment:
      POSTGRES_PASSWORD: dbk_secret
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 30

  pg-17:
    image: postgres:17
    container_name: dbk-pg-17
    environment:
      POSTGRES_PASSWORD: dbk_secret
      POSTGRES_DB: postgres
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 30
